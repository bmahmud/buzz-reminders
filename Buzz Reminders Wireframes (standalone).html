  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

var(--ink);border-radius:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;background:var(--paper)}\n.ic.r{border-radius:50%}\n.ic svg{width:18px;height:18px}\n.row > svg{width:20px;height:20px;flex:0 0 auto}\n.ln{height:9px;background:var(--line);border-radius:6px}\n.ln.sm{height:7px;opacity:.7}\n.ttlw{font-family:var(--display);font-size:21px;line-height:.95}\n.meta{font-size:12px;color:var(--ink-soft);margin-top:2px}\n.dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}\n.dot.hi{background:var(--hi)} .dot.med{background:var(--med)} .dot.low{background:var(--low)} .dot.crit{background:var(--crit)}\n.pill{font-size:12px;padding:2px 9px;border-radius:20px;border:1.6px solid var(--ink);display:inline-flex;align-items:center;gap:5px}\n.pill.hi{color:var(--hi);border-color:var(--hi)} .pill.med{color:var(--med);border-color:var(--med)} .pill.low{color:var(--low);border-color:var(--low)} .pill.crit{color:var(--crit);border-color:var(--crit)}\n.chip{font-size:13px;padding:4px 12px;border:1.8px solid var(--ink);border-radius:20px;background:var(--card);color:var(--ink-soft);white-space:nowrap}\n.chip.on{background:var(--ink);color:var(--paper)}\n.chiprow{display:flex;gap:7px;flex-wrap:wrap}\n.label{font-family:var(--display);font-size:18px;color:var(--ink-soft)}\n.input{border:2px solid var(--ink);background:var(--card);border-radius:12px;padding:9px 12px;font-size:13px;color:var(--ink-soft)}\n.toggle{width:40px;height:22px;border:2px solid var(--ink);border-radius:20px;position:relative;flex:0 0 auto;background:var(--card)}\n.toggle::after{content:\"\";position:absolute;top:1px;left:1px;width:16px;height:16px;border-radius:50%;background:var(--ink)}\n.toggle.on{background:var(--accent)} .toggle.on::after{left:auto;right:1px;background:var(--paper)}\n\n/* bottom nav */\n.bnav{flex:0 0 auto;border-top:2px solid var(--ink);display:flex;justify-content:space-around;padding:7px 4px 9px;background:var(--card)}\n.bnav .n{display:flex;flex-directio reet p{font-size:13px;color:var(--ink-soft)}\n\n.stat3{display:flex;gap:9px}\n.stat3 .s{flex:1;border:2px solid var(--ink);border-radius:14px;padding:8px;text-align:center;background:var(--card)}\nbody.sketch .stat3 .s{border-radius:120px 10px 120px 10px/10px 120px 10px 120px}\n.stat3 .s b{font-family:var(--display);font-size:26px;display:block;color:var(--accent)}\n.stat3 .s span{font-size:11px;color:var(--ink-soft)}\n\n.daygroup{font-family:var(--display);font-size:22px;color:var(--ink-soft);margin:4px 2px 0}\n.streak{display:flex;gap:5px}\n.streak i{width:15px;height:15px;border-radius:4px;border:2px solid var(--ink);display:block;background:var(--card)}\n.streak i.f{background:var(--accent)}\n\n.emptynote{font-family:var(--display);font-size:20px;color:var(--ink-soft);text-align:center;padding:20px 10px}\n.foot{text-align:center;color:var(--ink-soft);font-family:var(--display);font-size:20px;padding:34px 0 10px}\n<\u002Fstyle>\n<\u002Fhead>\n\n<body class=\"sketch\" style=\"font-family: Rubik\">\n<div class=\"wrap\">\n  <header class=\"top\">\n    <div class=\"kicker\">redesign exploration · low-fi wireframes<\u002Fdiv>\n    <h1>Buzz Reminders, <span class=\"u\">re-sketched<\u002Fspan><\u002Fh1>\n    <p class=\"sub\">Three structurally different takes — snappy, friendly &amp; personal — across all five tabs plus the new-reminder flow. Pick a tab to compare. These are rough on purpose: structure &amp; flow first, polish later.<\u002Fp>\n  <\u002Fheader>\n\n  <div class=\"controls\" id=\"controls\">\n    <div class=\"ctl\"><span class=\"lbl\">Accent<\u002Fspan>\n      <div class=\"swatches\" id=\"swatches\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ctl\"><span class=\"lbl\">Sketchiness<\u002Fspan>\n      <div class=\"tgl\" id=\"sk\"><button data-v=\"1\" class=\"on\">Rough<\u002Fbutton><button data-v=\"0\">Clean<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ctl\"><span class=\"lbl\">Priority colors<\u002Fspan>\n      <div class=\"tgl\" id=\"pc\"><button data-v=\"1\" class=\"on\">On<\u002Fbutton><button data-v=\"0\">Off<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ctl\"><span class=\"lbl\">Type<\u002Fspan>\n      <div class=\"tgl\" id=\"font\"><button data-v=\"upright\" class=\"on\">Upright<\u002Fbutton><button data-v=\"script\">Script<\u002Fbutton><button data-v=\"clean\">Clean<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tabs\" id=\"tabs\"><\u002Fdiv>\n  <div id=\"stage\"><\u002Fdiv>\n\n  <div class=\"foot\">↑ switch directions &amp; tweak above · tell me which one to take further ✦<\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ============ icons ============ */\nconst I = {\n  today:'<svg viewBox=\"0 0 24 24\"><rect x=\"4\" y=\"5\" width=\"16\" height=\"15\" rx=\"2\"/><path d=\"M4 9h16M8 3v4M16 3v4\"/><circle cx=\"9\" cy=\"13\" r=\"1.2\" fill=\"currentColor\" stroke=\"none\"/><\u002Fsvg>',\n  up:'<svg viewBox=\"0 0 24 24\"><rect x=\"4\" y=\"5\" width=\"16\" height=\"15\" rx=\"2\"/><path d=\"M4 9h16M8 3v4M16 3v4M13 13l2 2 3-3\"/><\u002Fsvg>',\n  habits:'<svg viewBox=\"0 0 24 24\"><path d=\"M4 9a7 7 0 0 1 12-3l2 2M20 6v3h-3\"/><path d=\"M20 15a7 7 0 0 1-12 3l-2-2M4 18v-3h3\"/><\u002Fsvg>',\n  all:'<svg viewBox=\"0 0 24 24\"><path d=\"M9 6h11M9 12h11M9 18h11\"/><circle cx=\"4.5\" cy=\"6\" r=\"1.3\" fill=\"currentColor\" stroke=\"none\"/><circle cx=\"4.5\" cy=\"12\" r=\"1.3\" fill=\"currentColor\" stroke=\"none\"/><circle cx=\"4.5\" cy=\"18\" r=\"1.3\" fill=\"currentColor\" stroke=\"none\"/><\u002Fsvg>',\n  set:'<svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"3.2\"/><path d=\"M12 3v3M12 18v3M3 12h3M18 12h3M5.5 5.5l2 2M16.5 16.5l2 2M18.5 5.5l-2 2M7.5 16.5l-2 2\"/><\u002Fsvg>',\n  plus:'<svg viewBox=\"0 0 24 24\"><path d=\"M12 5v14M5 12h14\"/><\u002Fsvg>',\n  back:'<svg viewBox=\"0 0 24 24\"><path d=\"M15 5l-7 7 7 7\"/><\u002Fsvg>',\n  chev:'<svg viewBox=\"0 0 24 24\"><path d=\"M9 5l7 7-7 7\"/><\u002Fsvg>',\n  tag:'<svg viewBox=\"0 0 24 24\"><path d=\"M4 4h7l9 9-7 7-9-9z\"/><circle cx=\"8\" cy=\"8\" r=\"1.3\" fill=\"currentColor\" stroke=\"none\"/><\u002Fsvg>',\n  pill:'<svg viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"9\" width=\"18\" height=\"6\" rx=\"3\" transform=\"rotate(45 12 12)\"/><path d=\"M9 9l6 6\"/><\u002Fsvg>',\n  cash:'<svg viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"6\" width=\"18\" height=\"12\" rx=\"2\"/><circle cx=\"12\" cy=\"12\" r=\"2.4\"/><\u002Fsvg>',\n  cal:'<svg viewBox=\"0 0 24 24\"><rect x=\"4\" y=\"5\" width=\"16\" height=\"15\" rx=\"2\"/><path d=\"M4 9h16M8 3v4M16 3v4\"/><\u002Fsvg>',\n  dumb:'<svg viewBox=\"0 0 24 24\"><path d=\"M3 9v6M6 7v10M18 7v10M21 9v6M6 12h12\"/><\u002Fsvg>',\n  bell:'<svg viewBox=\"0 0 24 24\"><path d=\"M6 16V11a6 6 0 0 1 12 0v5l2 2H4z\"/><path d=\"M10 20a2 2 0 0 0 4 0\"/><\u002Fsvg>',\n  bolt:'<svg viewBox=\"0 0 24 24\"><path d=\"M13 3L5 13h6l-1 8 8-10h-6z\"/><\u002Fsvg>',\n};\nconst sbar = ()=> '<div class=\"sbar\"><span>9:41<\u002Fspan><div class=\"dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv><\u002Fdiv>';\nfunction bnav(active, items){\n  items = items || [['today','Today',I.today],['up','Upcoming',I.up],['habits','Habits',I.habits],['all','All',I.all],['set','Settings',I.set]];\n  return '<div class=\"bnav\">'+items.map(([k,l,ic])=>`<div class=\"n ${k===active?'on':''}\">${ic}<span>${l}<\u002Fspan><\u002Fdiv>`).join('')+'<\u002Fdiv>';\n}\nconst wrapScreen = (inner)=> sbar()+inner;\n\n/* small builders */\nconst dot = p=>`<span class=\"dot ${p}\"><\u002Fspan>`;\nconst pill = (p,t)=>`<span class=\"pill ${p}\">${dot(p)}${t}<\u002Fspan>`;\nconst lines = (n,w)=> Array.from({length:n}).map((_,i)=>`<div class=\"ln ${i?'sm':''}\" style=\"width:${w?w[i]:(90-i*22)}%\"><\u002Fdiv>`).join('');\n\n/* ============================================================\n   DIRECTION A — DAY TIMELINE\n============================================================ */\nfunction dirA(){\n  const item=(t,sub,ic,p)=>`<div class=\"tlrow\"><span class=\"t\">${t}<\u002Fspan><span class=\"nub\" style=\"border-color:var(--${p})\"><\u002Fspan>\n    <div class=\"box\" style=\"padding:9px 11px\"><div class=\"row\"><div style=\"flex:1\"><div class=\"ttlw\">${sub}<\u002Fdiv><div class=\"meta\">${ic}<\u002Fdiv><\u002Fdiv>${dot(p)}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n  // Today\n  const today = wrapScreen(`<div class=\"body\">\n    <div class=\"hd\"><div class=\"ttl\">Today<small>Sun · Jun 1 · 3 left<\u002Fsmall><\u002Fdiv><div class=\"plus\">${I.plus}<\u002Fdiv><\u002Fdiv>\n    <div class=\"box\" style=\"background:var(--card);padding:10px 12px\"><div class=\"row\"><div class=\"streak\">${'<i class=\"f\"><\u002Fi>'.repeat(4)}<i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv><div style=\"flex:1\"><\u002Fdiv><span class=\"meta\">on track ✦<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div class=\"tl\">\n      ${item('8:00','Take meds','Medication · daily','crit')}\n      ${item('9:30','Stand-up call','Event','low')}\n      ${item('1:00','Pay rent','Bill','hi')}\n      ${item('6:00','Gym','Habit · weekdays','med')}\n      ${item('now','Get gas','Custom','med')}\n    <\u002Fdiv><\u002Fdiv>`)+bnav('today');\n  // Upcoming\n  const up = wrapScreen(`<div class=\"body\">\n    <div class=\"hd\"><div class=\"ttl\">Upcoming<\u002Fdiv><div class=\"plus\">${I.plus}<\u002Fdiv><\u002Fdiv>\n    <div class=\"daygroup\">Tomorrow · Mon<\u002Fdiv>\n    <div class=\"box\" style=\"padding:9px 11px\"><div class=\"row\">${I.cash}<div style=\"flex:1\"><div class=\"ttlw\">Electric bill<\u002Fdiv><div class=\"meta\">Bill · 9:00 AM<\u002Fdiv><\u002Fdiv>${dot('hi')}<\u002Fdiv><\u002Fdiv>\n    <div class=\"box\" style=\"padding:9px 11px\"><div class=\"row\">${I.cal}<div style=\"flex:1\"><div class=\"ttlw\">Dentist<\u002Fdiv><div class=\"meta\">Event · 2:30 PM<\u002Fdiv><\u002Fdiv>${dot('low')}<\u002Fdiv><\u002Fdiv>\n    <div class=\"daygroup\">Wed · Jun 4<\u002Fdiv>\n    <div class=\"box\" style=\"padding:9px 11px\"><div class=\"row\">${I.tag}<div style=\"flex:1\"><div class=\"ttlw\">Renew passport<\u002Fdiv><div class=\"meta\">Task<\u002Fdiv><\u002Fdiv>${dot('med')}<\u002Fdiv><\u002Fdiv>\n    <div class=\"daygroup\">Fri · Jun 6<\u002Fdiv>\n    <div class=\"box\" style=\"padding:9px 11px\"><div class=\"row\">${I.pill}<div style=\"flex:1\"><div class=\"ttlw\">Refill Rx<\u002Fdiv><div class=\"meta\">Medication<\u002Fdiv><\u002Fdiv>${dot('crit')}<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>`)+bnav('up');\n  // Habits\n  const hb = wrapScreen(`<div class=\"body\">\n    <div class=\"hd\"><div class=\"ttl\">Habits<small>this week<\u002Fsmall><\u002Fdiv><div class=\"plus\">${I.plus}<\u002Fdiv><\u002Fdiv>\n    ${['Gym','Read 20 min','Water plants','Vitamins'].map((h,i)=>`<div class=\"box\" style=\"padding:10px 12px\"><div class=\"ttlw\" style=\"margin-bottom:7px\">${h}<\u002Fdiv><div class=\"row\"><div class=\"streak\">${Array.from({length:7}).map((_,d)=>`<i class=\"${d<=(5-i)?'f':''}\"><\u002Fi>`).join('')}<\u002Fdiv><div style=\"flex:1\"><\u002Fdiv><span class=\"meta\">${5-i}🔥<\u002Fspan><\u002Fdiv><\u002Fdiv>`).join('')}\n  <\u002Fdiv>`)+bnav('habits');\n  // All\n  const all = wrapScreen(`<div class=\"body\">\n    <div class=\"hd\"><div class=\"ttl\">All<\u002Fdiv><div class=\"plus\">${I.plus}<\u002Fdiv><\u002Fdiv>\n    <div class=\"chiprow\"><span class=\"chip on\">All<\u002Fspan><span class=\"chip\">Tasks<\u002Fspan><span class=\"chip\">Bills<\u002Fspan><span class=\"chip\">Meds<\u002Fspan><span class=\"chip\">Habits<\u002Fspan><\u002Fdiv>\n    ${[['Get gas','Custom · Fri','tag','med'],['Pay rent','Bill · today','cash','hi'],['Take meds','Medication','pill','crit'],['Stand-up','Event','cal','low'],['Gym','Habit','dumb','med']].map(([t,m,ic,p])=>`<div class=\"box\" style=\"padding:9px 11px\"><div class=\"row\">${I[ic]}<div style=\"flex:1\"><div class=\"ttlw\">${t}<\u002Fdiv><div class=\"meta\">${m}<\u002Fdiv><\u002Fdiv>${dot(p)}<\u002Fdiv><\u002Fdiv>`).join('')}\n  <\u002Fdiv>`)+bnav('all');\n  // Settings\n  const set = wrapScreen(`<div class=\"body\">\n    <div class=\"hd\"><div class=\"ttl\">Settings<\u002Fdiv><\u002Fdiv>\n    <div class=\"greet\"><div class=\"av\">🦊<\u002Fdiv><div><h3>Hey, you<\u002Fh3><p>Free plan · 12 reminders<\u002Fp><\u002Fdiv><\u002Fdiv>\n    ${[['Notifications',1],['Sound &amp; vibration',1],['Daily summary',0],['Snooze length',null],['Theme',null],['Show onboarding',null]].map(([l,t])=>`<div class=\"box\" style=\"padding:11px 13px\"><div class=\"row\"><div style=\"flex:1\" class=\"ttlw\">${l}<\u002Fdiv>${t===null?I.chev:`<div class=\"toggle ${t?'on':''}\"><\u002Fdiv>`}<\u002Fdiv><\u002Fdiv>`).join('')}\n  <\u002Fdiv>`)+bnav('set');\n  // New reminder\n  const nw = wrapScreen(`<div class=\"body\">\n    <div class=\"hd\"><div class=\"ttl\" style=\"display:flex;align-items:center;gap:8px\"><span class=\"ic\" style=\"width:28px;height:28px;border-radius:8px\">${I.back}<\u002Fspan>New<\u002Fdiv><\u002Fdiv>\n    <div class=\"input\" style=\"font-size:16px;padding:12px\">What needs doing?<\u002Fdiv>\n    <div class=\"label\">Type<\u002Fdiv><div class=\"chiprow\"><span class=\"chip on\">Task<\u002Fspan><span class=\"chip\">Event<\u002Fspan><span class=\"chip\">Habit<\u002Fspan><span class=\"chip\">Med<\u002Fspan><span class=\"chip\">Bill<\u002Fspan><\u002Fdiv>\n    <div class=\"label\">Priority<\u002Fdiv><div class=\"chiprow\"><span class=\"chip\">Low<\u002Fspan><span class=\"chip on\">Med<\u002Fspan><span class=\"chip\">High<\u002Fspan><span class=\"chip\">Critical<\u002Fspan><\u002Fdiv>\n    <div class=\"label\">When<\u002Fdiv><div class=\"input\">Jun 1, 2026 · 4:16 PM 📅<\u002Fdiv>\n    <div class=\"label\">Repeat<\u002Fdiv><div class=\"chiprow\"><span class=\"chip on\">Once<\u002Fspan><span class=\"chip\">Daily<\u002Fspan><span class=\"chip\">Weekdays<\u002Fspan><span class=\"chip\">Weekly<\u002Fspan><\u002Fdiv>\n    <div class=\"box\" style=\"background:var(--accent);border-color:var(--ink);text-align:center;color:var(--paper);padding:11px\"><b class=\"ttlw\" style=\"color:var(--paper)\">Save reminder<\u002Fb><\u ('Get gas','Custom · Fri','tag','med')}\n    ${block('Stand-up','Event','cal','low')}\n  <\u002Fdiv>`)+bnav('all',[['today','Today',I.today],['up','Next',I.up],['habits','Habits',I.habits],['all','All',I.all],['set','You',I.set]]);\n  const set = wrapScreen(`<div class=\"body\">\n    ${tnav('set')}\n    <div class=\"hero\" style=\"background:var(--ink);text-align:center\"><div class=\"av\" style=\"margin:0 auto 6px;background:var(--accent);border-color:var(--paper);color:var(--paper)\">S<\u002Fdiv><div class=\"big\" style=\"font-size:30px\">Sam Rivera<\u002Fdiv><div class=\"meta\" style=\"color:rgba(255,255,255,.8)\">Pro · 12 reminders<\u002Fdiv><\u002Fdiv>\n    ${[['Notifications',1],['Default alert · Both',null],['Theme · Bold',null],['Snooze · 10 min',null],['Show onboarding',null]].map(([l,t])=>`<div class=\"box\" style=\"border-radius:10px;padding:11px 13px\"><div class=\"row\"><div style=\"flex:1\" class=\"ttlw\">${l}<\u002Fdiv>${t===null?I.chev:`<div class=\"toggle on\"><\u002Fdiv>`}<\u002Fdiv><\u002Fdiv>`).join('')}\n  <\u002Fdiv>`)+bnav('set',[['today','Today',I.today],['up','Next',I.up],['habits','Habits',I.habits],['all','All',I.all],['set','You',I.set]]);\n  // New = bold bottom sheet\n  const nw = wrapScreen(`<div class=\"body\" style=\"justify-content:flex-end;padding-bottom:0\">\n    <div style=\"flex:1\"><\u002Fdiv>\n    <div class=\"box\" style=\"border-radius:26px 26px 0 0;padding:16px 15px 18px;background:var(--card)\">\n      <div style=\"width:46px;height:5px;background:var(--line);border-radius:6px;margin:0 auto 12px\"><\u002Fdiv>\n      <div class=\"ttl\" style=\"font-family:var(--display);font-size:30px;margin-bottom:10px\">Quick add ${I.bolt}<\u002Fdiv>\n      <div class=\"input\" style=\"font-size:17px;padding:13px;margin-bottom:12px\">Title…<\u002Fdiv>\n      <div class=\"label\">Type<\u002Fdiv><div class=\"chiprow\" style=\"margin:5px 0 11px\"><span class=\"chip on\">Task<\u002Fspan><span class=\"chip\">Bill<\u002Fspan><span class=\"chip\ t','<b>warmth<\u002Fb> kills the bland generic feel'],\n   build:dirB},\n  {id:'C',name:'Bold Countdown',tag:'playful · urgent · punchy',\n   desc:'A big “NEXT UP” hero with a live countdown drives urgency; top tabs, color-blocked rows, and a punchy quick-add sheet. Loud, fast, gamified streaks.',\n   solves:['<b>urgency<\u002Fb> a countdown hero you can’t miss','<b>bold<\u002Fb> color-blocked rows, zero blandness','<b>fast<\u002Fb> quick-add bottom sheet'],\n   build:dirC},\n];\n\n/* ============ render ============ */\nconst tabsEl=document.getElementById('tabs'), stage=document.getElementById('stage');\nlet active=0;\nDIRS.forEach((d,i)=>{\n  const t=document.createElement('div'); t.className='tab'+(i===0?' on':'');\n  t.innerHTML=`${d.id} · ${d.name}<small>${d.tag}<\u002Fsmall>`;\n  t.onclick=()=>{active=i;render();};\n  tabsEl.appendChild(t);\n});\nfunction render(){\n  [...tabsEl.children].forEach((t,i)=>t.classList.toggle('on',i===active));\n  const d=DIRS[active];\n  stage.innerHTML=`<div class=\"dirhead\">\n    <h2><span class=\"pin\">Direction ${d.id}<\u002Fspan> ${d.name}<\u002Fh2>\n    <p>${d.desc}<\u002Fp>\n    <div class=\"solves\">${d.solves.map(s=>`<span>${s}<\u002Fspan>`).join('')}<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"rail\">${d.build().map(s=>`<figure class=\"frame\"><div class=\"screen\">${s.html}<\u002Fdiv><figcaption>${s.label}<\u002Ffigcaption><\u002Ffigure>`).join('')}<\u002Fdiv>`;\n}\nrender();\n\n/* ============ tweaks ============ */\nconst ACCENTS=[['#ff7a4d','warm coral'],['#4f9be0','buzz blue'],['#19a974','mint'],['#a86bd6','grape'],['#f0a73a','amber']];\nconst swEl=document.getElementById('swatches');\nACCENTS.forEach(([c],i)=>{const s=document.createElement('div');s.className='sw'+(i===0?' on':'');s.style.background=c;s.onclick=()=>{document.documentElement.style.setProperty('--accent',c);[...swEl.children].forEach(x=>x.classList.remove('on'));s.classList.add('on');};swEl.appendChild(s);});\ndocument.getElementById('sk').addEventListener('click',e=>{if(e.target.dataset.v===undefined)return;document.body.classList.toggle('sketch',e.target.dataset.v==='1');[...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target));});\ndocument.getElementById('pc').addEventListener('click',e=>{if(e.target.dataset.v===undefined)return;const on=e.target.dataset.v==='1';\n  const r=document.documentElement.style; if(on){r.setProperty('--hi','#e8543a');r.setProperty('--med','#f0a73a');r.setProperty('--low','#4f9be0');r.setProperty('--crit','#d6336c');}\n  else{['--hi','--med','--low','--crit'].forEach(v=>r.setProperty(v,'#9a948a'));}\n  [...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target));});\nconst FONTS={upright:\"'Patrick Hand', system-ui, cursive\",script:\"'Caveat', cursive\",clean:\"'Nunito', system-ui, sans-serif\"};\ndocument.getElementById('font').addEventListener('click',e=>{const v=e.target.dataset.v;if(!v)return;document.documentElement.style.setProperty('--display',FONTS[v]);[...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target));});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
